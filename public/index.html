<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family scriptures</title>
<style>
  :root{
    --bg:#EAE6DC; --surface:#FBF9F4; --surface-2:#F1ECE0;
    --border:#E2DCCC; --border-strong:#D9D3C4;
    --ink:#2B2A28; --ink-soft:#5C584F; --ink-faint:#8A8475;
    --gold:#6B5A3E; --warn:#8C6A2E; --green:#4F6F4F; --red:#A4503C;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:32px 16px; background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink); display:flex; justify-content:center;
  }
  .phone{
    width:380px; max-width:100%; background:var(--surface);
    border-radius:24px; border:1px solid var(--border-strong);
    overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,0.04);
  }
  h1{font-size:22px;font-weight:600;margin:0 0 14px}
  .eyebrow{font-size:12px;color:var(--ink-faint);margin:0 0 2px}
  .section{margin:0 18px 14px}
  .section-title{font-size:13px;font-weight:600;color:var(--ink-soft);margin:0 0 8px}
  .muted{color:var(--ink-faint);font-size:13px}
  .footnote{font-size:11px;color:var(--ink-faint);margin:18px 18px;line-height:1.5}

  .profile-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px 0}
  .profile-label{font-size:13px;color:var(--ink-soft)}
  .profile-switch{border:1px solid var(--border-strong);background:var(--surface);border-radius:999px;padding:4px 12px;font-size:12px;color:var(--ink);cursor:pointer}
  .profile-panel{margin:10px 18px 0;background:var(--surface-2);border-radius:14px;padding:14px}
  .profile-panel-label{font-size:12px;color:var(--ink-soft);margin:0 0 8px}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .chip{border:1px solid var(--border-strong);background:var(--surface);border-radius:999px;padding:6px 14px;font-size:13px;cursor:pointer}
  .profile-add-row{display:flex;gap:8px}
  .profile-add-row input{flex:1}

  .scripture-card{background:var(--surface-2);border-radius:14px;padding:16px}
  .ref{font-size:13px;font-weight:700;color:var(--gold);margin:0 0 8px}
  .verse{font-family:Georgia,"Times New Roman",serif;font-size:16px;line-height:1.6;margin:0}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
  .muted-card{opacity:0.7}
  .voice-row{display:flex;align-items:center;gap:12px}
  .avatar{border-radius:50%;border:1px solid var(--border-strong);object-fit:cover;flex-shrink:0}
  .voice-name{font-weight:600;font-size:14px;margin:0}
  .voice-sub{font-size:12px;color:var(--ink-faint);margin:2px 0 0}

  .luam-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .luam-btn{padding:12px;border-radius:12px;border:1px solid var(--border-strong);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer}

  .progress-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .progress-label{font-size:13px;font-weight:600;margin:0}
  .progress-count{font-size:12px;color:var(--ink-faint);margin:0}
  .progress-track{height:6px;background:var(--surface-2);border-radius:999px;overflow:hidden}
  .progress-fill{height:100%;background:var(--green);border-radius:999px}
  .family-progress-row{margin-bottom:14px}

  .nav{display:flex;border-top:1px solid var(--border);padding:10px 18px;justify-content:space-between;margin-top:6px}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;background:none;border:none;cursor:pointer;padding:4px}

  .list-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .list-row{display:flex;justify-content:space-between;align-items:center;width:100%;padding:14px 16px;border:none;border-bottom:1px solid var(--border);background:var(--surface);font-size:14px;color:var(--ink);cursor:pointer;text-align:left}
  .list-row:last-child{border-bottom:none}
  .list-icons{display:flex;gap:6px}

  .detail-header{display:flex;align-items:center;justify-content:space-between;padding:18px}
  .icon-btn{background:none;border:none;cursor:pointer;padding:4px}

  .tab-row{display:flex;gap:6px;margin-bottom:10px}
  .tab-btn{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border-strong);background:var(--surface);font-size:12px;font-weight:600;color:var(--ink-faint);cursor:pointer}
  .tab-active{background:var(--ink);color:var(--surface);border-color:var(--ink)}
  .body-text{font-size:14px;line-height:1.6;margin:0 0 12px}
  .memorize-text{margin-bottom:14px}

  .primary-btn{display:inline-block;width:auto;padding:11px 16px;border-radius:12px;border:1px solid var(--ink);background:var(--ink);color:var(--surface);font-size:14px;font-weight:600;cursor:pointer;text-align:center}
  .secondary-btn{padding:11px 16px;border-radius:12px;border:1px solid var(--border-strong);background:var(--surface);color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
  .success-btn{background:var(--green);border-color:var(--green)}
  .danger-btn{background:var(--red);border-color:var(--red)}
  .text-btn{background:none;border:none;font-size:12px;cursor:pointer}
  .text-btn.danger{color:var(--red)}

  textarea, input[type="text"], select{
    width:100%;border:1px solid var(--border-strong);border-radius:10px;padding:9px 11px;
    font-size:14px;font-family:inherit;margin-bottom:8px;background:var(--surface);color:var(--ink);
  }
  .field-label{font-size:12px;color:var(--ink-soft);font-weight:600;margin:8px 0 4px;display:block}

  .slider-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .slider-row input[type=range]{flex:1}
  .slider-out{font-size:12px;color:var(--ink-faint);min-width:36px;text-align:right}

  .story-item{padding:10px 0;border-top:1px solid var(--border)}
  .story-item:first-child{border-top:none}
  .story-author{font-size:12px;font-weight:600;color:var(--ink-soft);margin:0 0 2px}
  .story-text{font-size:14px;margin:0;line-height:1.5}
  .story-list{margin-top:10px}

  .manage-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
  .manage-row:last-child{border-bottom:none}

  .rec-dot{width:14px;height:14px;border-radius:50%;background:var(--red);margin:6px auto 10px;animation:pulse 1.2s infinite}
  @keyframes pulse{0%{opacity:1}50%{opacity:0.35}100%{opacity:1}}
  .rec-timer{font-size:28px;font-weight:600;margin:0 0 4px}

  .inline-alert{display:none;margin:0 18px 10px;background:#F5DCD2;color:var(--red);border-radius:10px;padding:10px 12px;font-size:13px}
</style>
</head>

function buildLocateUrl(reference){
  const m = reference.match(/^(.*?)\s+(\d+)\s*[:.]\s*(\d+)(?:[-\u2013](\d+))?\s*$/);
  if(!m) return 'https://www.churchofjesuschrist.org/study/scriptures?lang=eng';
  const book = m[1].trim().toLowerCase();
  const chapter = m[2], v1 = m[3], v2 = m[4];
  const code = BOOK_MAP[book];
  if(!code) return 'https://www.churchofjesuschrist.org/study/scriptures?lang=eng';
  const idParam = v2 ? ('p' + v1 + '-p' + v2) : ('p' + v1);
  return 'https://www.churchofjesuschrist.org/study/scriptures/' + code + '/' + chapter + '?lang=eng&id=' + idParam + '#p' + v1;
}

/* Storage layer backed by a Netlify Function + Netlify Blobs.
   The "shared" parameter is kept for compatibility with the rest of the
   app's calls but is not used here, every key lives in one site-wide
   store. Personal vs shared separation is already handled by how keys
   are named (e.g. "progress:Emma" vs "progress:Jake"). */
const memStore = {};
const STORAGE_ENDPOINT = '/api/storage';
const PROTECTED_EXACT = ['scriptures', 'recording_index'];
const PROTECTED_PREFIXES = ['recording:'];

function isProtectedKey(key){
  if (PROTECTED_EXACT.indexOf(key) !== -1) return true;
  return PROTECTED_PREFIXES.some(function(p){ return key.indexOf(p) === 0; });
}

async function sGet(key, shared, fallback){
  try {
    const res = await fetch(STORAGE_ENDPOINT + '?key=' + encodeURIComponent(key));
    if(!res.ok) return (key in memStore) ? memStore[key] : fallback;
    const data = await res.json();
    if(data.value === null || data.value === undefined) return fallback;
    const parsed = JSON.parse(data.value);
    memStore[key] = parsed;
    return parsed;
  } catch(e){
    return (key in memStore) ? memStore[key] : fallback;
  }
}

async function sSet(key, value, shared){
  memStore[key] = value;
  try {
    const headers = { 'Content-Type': 'application/json' };
    if(isProtectedKey(key) && state.adminPin) headers['x-family-pin'] = state.adminPin;
    const res = await fetch(STORAGE_ENDPOINT, {
      method: 'POST',
      headers: headers,
      body: JSON.stringify({ key: key, value: JSON.stringify(value) })
    });
    return res.ok;
  } catch(e){
    return false;
  }
}

async function sDelete(key){
  delete memStore[key];
  try {
    const headers = {};
    if(isProtectedKey(key) && state.adminPin) headers['x-family-pin'] = state.adminPin;
    const res = await fetch(STORAGE_ENDPOINT + '?key=' + encodeURIComponent(key), { method: 'DELETE', headers: headers });
    return res.ok;
  } catch(e){
    return false;
  }
}

async function checkPinIsSet(){
  try {
    const res = await fetch(STORAGE_ENDPOINT + '?key=admin_pin');
    const data = await res.json();
    return !!data.value;
  } catch(e){ return false; }
}

async function verifyPin(pin){
  try {
    const res = await fetch(STORAGE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: '__verify_pin__', value: pin })
    });
    const data = await res.json();
    return !!data.ok;
  } catch(e){ return false; }
}

async function setupPin(newPin, currentPin){
  try {
    const res = await fetch(STORAGE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: 'admin_pin', value: newPin, currentPin: currentPin || '' })
    });
    return res.ok;
  } catch(e){ return false; }
}

function esc(s){
  if(s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function maskText(text, percent){
  if(percent <= 0) return esc(text);
  const words = text.split(' ');
  const out = words.map(function(w){
    const m = w.match(/^([A-Za-z']+)(.*)$/);
    if(!m) return esc(w);
    const core = m[1], rest = m[2];
    const hideChars = Math.ceil((core.length - 1) * (percent / 100));
    const visible = Math.max(1, core.length - hideChars);
    const shown = core.slice(0, visible);
    const hidden = core.length > visible ? ' '.repeat(0) + '_'.repeat(core.length - visible) : '';
    return esc(shown) + hidden + esc(rest);
  });
  return out.join(' ');
}

function dayOfYearIndex(len){
  if(len === 0) return 0;
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  const day = Math.floor(diff / 86400000);
  return day % len;
}

const state = {
  view: 'home',
  scriptures: [],
  currentId: null,
  detailTab: 'locate',
  profile: null,
  profilePanelOpen: false,
  familyMembers: [],
  progress: {},
  stories: [],
  recordingMeta: {},
  recordingsCache: {},
  newScriptureOpen: false,
  adminUnlocked: false,
  adminPin: null,
  pinIsSet: false,
  showPinEntry: false
};

let mediaRecorder = null;
let audioChunks = [];
let recordSeconds = 0;
let recordTimerHandle = null;
let recordedBlob = null;
let recordTargetId = null;
let recordingActive = false;

async function getRecording(id){
  if(state.recordingsCache[id]) return state.recordingsCache[id];
  const rec = await sGet('recording:' + id, true, null);
  if(rec) state.recordingsCache[id] = rec;
  return rec;
}

async function init(){
  let scriptures = await sGet('scriptures', true, null);
  if(!scriptures){
    scriptures = DEFAULT_SCRIPTURES.slice();
    await sSet('scriptures', scriptures, true);
  }
  state.scriptures = scriptures;
  state.familyMembers = await sGet('family_members', true, []);
  state.stories = await sGet('stories', true, []);
  state.recordingMeta = await sGet('recording_index', true, {});
  state.pinIsSet = await checkPinIsSet();

  if(state.pinIsSet){
    const savedPin = localStorage.getItem('family_scriptures_pin');
    if(savedPin){
      const ok = await verifyPin(savedPin);
      if(ok){
        state.adminPin = savedPin;
        state.adminUnlocked = true;
      } else {
        localStorage.removeItem('family_scriptures_pin');
      }
    }
  }

  await render();
}

async function loadProgressFor(name){
  if(state.progress[name]) return state.progress[name];
  const p = await sGet('progress:' + name, true, { memorized: [], favorites: [] });
  state.progress[name] = p;
  return p;
}

async function goView(view, id){
  state.view = view;
  if(id !== undefined) state.currentId = id;
  if(view === 'detail') state.detailTab = 'locate';
  await render();
  if(typeof window !== 'undefined') window.scrollTo(0, 0);
}

function toggleProfilePanel(){
  state.profilePanelOpen = !state.profilePanelOpen;
  render();
}

async function selectProfile(name){
  state.profile = name;
  state.profilePanelOpen = false;
  await loadProgressFor(name);
  await render();
}

async function addProfileFromInput(){
  const input = document.getElementById('newProfileInput');
  if(!input) return;
  const name = input.value.trim();
  if(!name) return;
  if(state.familyMembers.indexOf(name) === -1){
    state.familyMembers.push(name);
    await sSet('family_members', state.familyMembers, true);
  }
  await selectProfile(name);
}

async function toggleMemorized(id){
  if(!state.profile){ state.profilePanelOpen = true; await render(); return; }
  const p = await loadProgressFor(state.profile);
  const idx = p.memorized.indexOf(id);
  if(idx >= 0) p.memorized.splice(idx, 1); else p.memorized.push(id);
  await sSet('progress:' + state.profile, p, true);
  await render();
}

async function toggleFavorite(id){
  if(!state.profile){ state.profilePanelOpen = true; await render(); return; }
  const p = await loadProgressFor(state.profile);
  const idx = p.favorites.indexOf(id);
  if(idx >= 0) p.favorites.splice(idx, 1); else p.favorites.push(id);
  await sSet('progress:' + state.profile, p, true);
  await render();
}

function setDetailTab(tab){
  state.detailTab = tab;
  render();
}

function onMaskSlider(val){
  const el = document.getElementById('maskedVerse');
  const scripture = state.scriptures.find(function(s){ return s.id === state.currentId; });
  if(el && scripture) el.innerHTML = maskText(scripture.text, Number(val));
  const out = document.getElementById('maskPercentOut');
  if(out) out.textContent = val + '%';
}

async function addStoryFromInput(id){
  const ta = document.getElementById('storyInput');
  if(!ta) return;
  const text = ta.value.trim();
  if(!text) return;
  const author = state.profile || 'Family member';
  state.stories.unshift({ scriptureId: id, author: author, text: text, date: Date.now() });
  await sSet('stories', state.stories, true);
  ta.value = '';
  await render();
}

function openAddScripture(){
  state.newScriptureOpen = true;
  render();
}
function closeAddScripture(){
  state.newScriptureOpen = false;
  render();
}

async function saveNewScripture(){
  if(!state.adminUnlocked){ alertInline('Unlock editing first.'); return; }
  const ref = document.getElementById('newRef').value.trim();
  const text = document.getElementById('newText').value.trim();
  const understand = document.getElementById('newUnderstand').value.trim();
  const apply = document.getElementById('newApply').value.trim();
  if(!ref || !text) return;
  const id = ref.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') + '-' + Date.now().toString(36);
  state.scriptures.push({ id: id, ref: ref, text: text, understand: understand, apply: apply });
  const ok = await sSet('scriptures', state.scriptures, true);
  if(!ok){ state.scriptures.pop(); alertInline('Could not save, try unlocking again.'); return; }
  state.newScriptureOpen = false;
  await render();
}

async function deleteScripture(id){
  if(!state.adminUnlocked){ alertInline('Unlock editing first.'); return; }
  const previous = state.scriptures;
  state.scriptures = state.scriptures.filter(function(s){ return s.id !== id; });
  const ok = await sSet('scriptures', state.scriptures, true);
  if(!ok){ state.scriptures = previous; alertInline('Could not remove, try unlocking again.'); return; }
  await render();
}

async function startRecording(targetId){
  if(!state.adminUnlocked){ alertInline('Unlock editing first.'); return; }
  recordTargetId = targetId;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4'];
    let mimeType = '';
    for(let i = 0; i < candidates.length; i++){
      if(window.MediaRecorder && MediaRecorder.isTypeSupported(candidates[i])){ mimeType = candidates[i]; break; }
    }
    mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType: mimeType }) : new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = function(e){ if(e.data && e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = function(){
      recordedBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      stream.getTracks().forEach(function(t){ t.stop(); });
      recordingActive = false;
      render();
    };
    mediaRecorder.start();
    recordingActive = true;
    recordSeconds = 0;
    recordTimerHandle = setInterval(function(){
      recordSeconds++;
      const t = document.getElementById('recordTimer');
      if(t) t.textContent = recordSeconds + 's';
      if(recordSeconds >= 60) stopRecording();
    }, 1000);
    await render();
  } catch(err){
    alertInline('Microphone access was not allowed. Please allow microphone permission and try again.');
  }
}

function stopRecording(){
  if(recordTimerHandle){ clearInterval(recordTimerHandle); recordTimerHandle = null; }
  if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
}

function discardRecording(){
  recordedBlob = null;
  recordSeconds = 0;
  render();
}

async function saveRecording(){
  if(!state.adminUnlocked){ alertInline('Unlock editing first.'); return; }
  if(!recordedBlob || !recordTargetId) return;
  const reader = new FileReader();
  reader.onloadend = async function(){
    const base64 = String(reader.result).split(',')[1];
    const rec = { audioBase64: base64, mimeType: recordedBlob.type, recordedAt: Date.now(), durationSec: recordSeconds };
    const ok = await sSet('recording:' + recordTargetId, rec, true);
    if(!ok){ alertInline('Could not save the recording, try unlocking again.'); return; }
    state.recordingMeta[recordTargetId] = { recordedAt: rec.recordedAt, durationSec: rec.durationSec };
    state.recordingsCache[recordTargetId] = rec;
    await sSet('recording_index', state.recordingMeta, true);
    recordedBlob = null;
    recordSeconds = 0;
    await render();
  };
  reader.readAsDataURL(recordedBlob);
}

async function deleteRecording(id){
  if(!state.adminUnlocked){ alertInline('Unlock editing first.'); return; }
  delete state.recordingMeta[id];
  delete state.recordingsCache[id];
  await sSet('recording_index', state.recordingMeta, true);
  await sDelete('recording:' + id);
  await render();
}

let holdProgressInterval = null;
let holdStartTime = 0;

function startHold(){
  if(state.adminUnlocked) return;
  clearHold();
  holdStartTime = Date.now();
  holdProgressInterval = setInterval(function(){
    const elapsed = Date.now() - holdStartTime;
    const pct = Math.min(100, (elapsed / 2000) * 100);
    const ring = document.getElementById('holdRing');
    if(ring) ring.style.background = 'conic-gradient(var(--gold) ' + pct + '%, transparent ' + pct + '%)';
    if(elapsed >= 2000){
      clearHold();
      state.showPinEntry = true;
      render();
    }
  }, 40);
}

function clearHold(){
  if(holdProgressInterval){ clearInterval(holdProgressInterval); holdProgressInterval = null; }
  const ring = document.getElementById('holdRing');
  if(ring) ring.style.background = 'transparent';
}

function cancelPinEntry(){
  state.showPinEntry = false;
  render();
}

async function submitPin(){
  const input = document.getElementById('pinInput');
  if(!input) return;
  const pin = input.value.trim();
  if(!pin) return;
  const ok = await verifyPin(pin);
  if(ok){
    state.adminPin = pin;
    state.adminUnlocked = true;
    state.showPinEntry = false;
    localStorage.setItem('family_scriptures_pin', pin);
    await render();
  } else {
    alertInline('That PIN is not correct.');
  }
}

async function submitNewPin(){
  const input = document.getElementById('newPinSetup');
  if(!input) return;
  const pin = input.value.trim();
  if(!pin || pin.length < 4){ alertInline('Choose a PIN with at least 4 digits.'); return; }
  const ok = await setupPin(pin, '');
  if(ok){
    state.pinIsSet = true;
    state.adminPin = pin;
    state.adminUnlocked = true;
    localStorage.setItem('family_scriptures_pin', pin);
    await render();
  } else {
    alertInline('Could not set up the PIN, try again.');
  }
}

function lockAdmin(){
  state.adminUnlocked = false;
  state.adminPin = null;
  localStorage.removeItem('family_scriptures_pin');
  render();
}

function alertInline(msg){
  const el = document.getElementById('inlineAlert');
  if(el){
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(function(){ el.style.display = 'none'; }, 4000);
  }
}

    return '<div class="family-progress-row">' +
      '<div class="progress-row"><p class="progress-label">' + esc(name) + '</p><p class="progress-count">' + p.memorized.length + ' of ' + state.scriptures.length + '</p></div>' +
      '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
    '</div>';
  }));

  const storyList = state.stories.slice(0, 20).map(function(st){
    const ref = (state.scriptures.find(function(s){ return s.id === st.scriptureId; }) || {}).ref || '';
    return '<div class="story-item"><p class="story-author">' + esc(st.author) + (ref ? (' &middot; ' + esc(ref)) : '') + '</p><p class="story-text">' + esc(st.text) + '</p></div>';
  }).join('');

  return await renderProfileBar() +
    '<div style="padding:18px 18px 0"><p class="eyebrow">Family scriptures</p><h1>Family</h1></div>' +
    '<div class="section"><p class="section-title">Progress</p>' + (progressRows.join('') || '<p class="muted">No family members yet. Choose your name above to get started.</p>') + '</div>' +
    '<div class="section"><p class="section-title">Family stories</p>' + (storyList || '<p class="muted">No stories shared yet.</p>') + '</div>' +
    renderNav();
}

async function renderSettings(){
  let accessHtml = '';
  if(state.adminUnlocked){
    accessHtml = '<div class="section"><div class="card" style="display:flex;justify-content:space-between;align-items:center">' +
      '<span class="body-text" style="margin:0">Editing unlocked on this device</span>' +
      '<button class="text-btn danger" onclick="lockAdmin()">Lock</button>' +
    '</div></div>';
  } else if(!state.pinIsSet){
    accessHtml = '<div class="section"><p class="section-title">Set up editing access</p>' +
      '<div class="card">' +
        '<p class="muted" style="margin:0 0 8px">Choose a PIN. Whoever knows it can edit the scripture list and use the recording booth.</p>' +
        '<input id="newPinSetup" type="text" inputmode="numeric" placeholder="Choose a PIN (4+ digits)">' +
        '<button class="primary-btn" style="width:100%" onclick="submitNewPin()">Set PIN</button>' +
      '</div></div>';
  } else if(state.showPinEntry){
    accessHtml = '<div class="section"><div class="card" style="text-align:center">' +
      '<p class="muted" style="margin:0 0 8px">Enter the PIN to unlock editing</p>' +
      '<input id="pinInput" type="text" inputmode="numeric" placeholder="PIN" style="text-align:center">' +
      '<div style="display:flex;gap:8px">' +
        '<button class="primary-btn" style="flex:1" onclick="submitPin()">Unlock</button>' +
        '<button class="secondary-btn" style="flex:1" onclick="cancelPinEntry()">Cancel</button>' +
      '</div></div></div>';
  } else {
    accessHtml = '<div class="section"><div class="card" style="text-align:center">' +
      '<div id="holdAvatarWrap" style="position:relative;width:64px;height:64px;margin:0 auto 10px;border-radius:50%;touch-action:none" onpointerdown="startHold()" onpointerup="clearHold()" onpointerleave="clearHold()" onpointercancel="clearHold()">' +
        '<div id="holdRing" style="position:absolute;inset:-4px;border-radius:50%;background:transparent"></div>' +
        avatarImg(64) +
      '</div>' +
      '<p class="muted" style="margin:0">Press and hold Grandpa\'s photo for 2 seconds to unlock editing</p>' +
    '</div></div>';
  }

  const newForm = !state.adminUnlocked ? '' : (state.newScriptureOpen ? (
    '<div class="card" style="margin-top:10px">' +
      '<label class="field-label">Reference</label><input id="newRef" type="text" placeholder="e.g. John 3:16">' +
      '<label class="field-label">Verse text</label><textarea id="newText" rows="3" placeholder="Paste the verse text"></textarea>' +
      '<label class="field-label">Understand (optional)</label><textarea id="newUnderstand" rows="2" placeholder="A short, simple explanation"></textarea>' +
      '<label class="field-label">Apply (optional)</label><textarea id="newApply" rows="2" placeholder="A real-life scenario or question"></textarea>' +
      '<div style="display:flex;gap:8px;margin-top:10px">' +
        '<button class="primary-btn" onclick="saveNewScripture()" style="flex:1">Save</button>' +
        '<button class="secondary-btn" onclick="closeAddScripture()" style="flex:1">Cancel</button>' +
      '</div>' +
    '</div>'
  ) : '<button class="secondary-btn" style="width:100%" onclick="openAddScripture()">' + navIcon('plus', true) + ' Add a scripture</button>');

  const manageList = state.scriptures.map(function(s){
    const removeBtn = state.adminUnlocked ? ('<button class="text-btn danger" onclick="deleteScripture(\'' + s.id + '\')">Remove</button>') : '';
    return '<div class="manage-row"><span>' + esc(s.ref) + '</span>' + removeBtn + '</div>';
  }).join('');

  const recordingBoothHtml = state.adminUnlocked
    ? '<button class="primary-btn" style="width:100%" onclick="goView(\'record\')">' + navIcon('mic', true) + ' Open the recording booth</button>'
    : '<p class="muted">Unlock editing above to open the recording booth.</p>';

  return await renderProfileBar() +
    '<div style="padding:18px 18px 0"><p class="eyebrow">Family scriptures</p><h1>Settings</h1></div>' +
    '<div id="inlineAlert" class="inline-alert"></div>' +
    accessHtml +
    '<div class="section">' +
      '<p class="section-title">Grandpa\'s recordings</p>' +
      recordingBoothHtml +
    '</div>' +
    '<div class="section">' +
      '<p class="section-title">Family scripture list</p>' +
      '<div class="card">' + manageList + '</div>' +
      newForm +
    '</div>' +
    '<div class="section">' +
      '<a class="secondary-btn" style="width:100%;display:block;text-align:center;text-decoration:none" href="https://www.churchofjesuschrist.org/study/scriptures?lang=eng" target="_blank" rel="noopener">Open Gospel Library</a>' +
    '</div>' +
    '<p class="footnote">Family progress, favorites, and stories are open for everyone to add. Changing the scripture list and adding or removing recordings requires the PIN.</p>' +
    renderNav();
}

async function renderRecordBooth(){
  if(!state.adminUnlocked){
    return '<div class="detail-header">' +
        '<button class="icon-btn" onclick="goView(\'settings\')">' + navIcon('back', true) + '</button>' +
        '<div><p class="ref" style="margin:0">Recording booth</p></div>' +
        '<span></span>' +
      '</div>' +
      '<div class="section"><div class="card"><p class="muted" style="margin:0">This area is locked. Go back to Settings and unlock editing first.</p></div></div>';
  }
  const recordedScriptures = state.scriptures.filter(function(s){ return !!state.recordingMeta[s.id]; });
  const unrecordedScriptures = state.scriptures.filter(function(s){ return !state.recordingMeta[s.id]; });

  const options = state.scriptures.map(function(s){
    const selected = s.id === recordTargetId ? ' selected' : '';
    const has = state.recordingMeta[s.id] ? ' (recorded)' : '';
    return '<option value="' + s.id + '"' + selected + '>' + esc(s.ref) + esc(has) + '</option>';
  }).join('');

  let recorderHtml = '';
  if(recordedBlob){
    const url = URL.createObjectURL(recordedBlob);
    recorderHtml = '<div class="card">' +
      '<p class="body-text">Preview your recording:</p>' +
      '<audio controls style="width:100%" src="' + url + '"></audio>' +
      '<div style="display:flex;gap:8px;margin-top:10px">' +
        '<button class="primary-btn" style="flex:1" onclick="saveRecording()">Save this recording</button>' +
        '<button class="secondary-btn" style="flex:1" onclick="discardRecording()">Re-record</button>' +
      '</div>' +
    '</div>';
  } else if(recordingActive){
    recorderHtml = '<div class="card" style="text-align:center">' +
      '<div class="rec-dot"></div>' +
      '<p id="recordTimer" class="rec-timer">0s</p>' +
      '<p class="muted">Recording will stop automatically at 60s</p>' +
      '<button class="primary-btn danger-btn" onclick="stopRecording()">Stop recording</button>' +
    '</div>';
  } else {
    recorderHtml = '<div class="card">' +
      '<label class="field-label">Which scripture is this for?</label>' +
      '<select id="recordScriptureSelect">' + options + '</select>' +
      '<button class="primary-btn" style="width:100%;margin-top:10px" onclick="startRecording(document.getElementById(\'recordScriptureSelect\').value)">' + navIcon('mic', true) + ' Start recording</button>' +
      '<p class="muted" style="margin-top:8px">Aim for 30 to 60 seconds: why you chose this verse, when it helped you, or what you hope your family learns from it.</p>' +
    '</div>';
  }

  const checklist = state.scriptures.map(function(s){
    const has = !!state.recordingMeta[s.id];
    return '<div class="manage-row">' +
      '<span>' + esc(s.ref) + (has ? '' : '') + '</span>' +
      (has ? ('<div style="display:flex;gap:10px;align-items:center">' + navIcon('mic', true) + '<button class="text-btn danger" onclick="deleteRecording(\'' + s.id + '\')">Delete</button></div>') : '<span class="muted">not recorded</span>') +
    '</div>';
  }).join('');

  return '<div class="detail-header">' +
      '<button class="icon-btn" onclick="goView(\'settings\')">' + navIcon('back', true) + '</button>' +
      '<div><p class="ref" style="margin:0">Grandpa\'s recording booth</p></div>' +
      '<span></span>' +
    '</div>' +
    '<div id="inlineAlert" class="inline-alert"></div>' +
    '<div class="section">' + recorderHtml + '</div>' +
    '<div class="section"><p class="section-title">' + recordedScriptures.length + ' of ' + state.scriptures.length + ' recorded</p><div class="card">' + checklist + '</div></div>';
}

async function render(){
  const el = document.getElementById('app-content');
  if(!el) return;
  let html = '';
  if(state.view === 'home') html = await renderHome();
  else if(state.view === 'list') html = await renderList();
  else if(state.view === 'detail') html = await renderDetail();
  else if(state.view === 'family') html = await renderFamily();
  else if(state.view === 'settings') html = await renderSettings();
  else if(state.view === 'record') html = await renderRecordBooth();
  el.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', init);


</script>
</body>
</html>
